name: biofit_pro
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+32

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State Management
  flutter_bloc: ^8.1.0
  equatable: ^2.0.5

  # DI
  get_it: ^7.6.0
  injectable: ^2.3.0

  # Database
  isar: ^3.1.0+1
  isar_flutter_libs:
    git:
      url: https://github.com/MrLittleWhite/isar_flutter_libs.git
      ref: main
  path_provider: ^2.1.1

  # UI & Utils
  google_fonts: ^6.1.0
  intl: ^0.19.0
  table_calendar: ^3.1.0
  fl_chart: ^1.1.1
  uuid: ^4.3.3
  gap: ^3.0.0
  audioplayers: ^6.1.0
  collection: ^1.18.0
  vibration: ^2.0.1
  flutter_local_notifications: ^17.1.2
  alarm: ^5.0.0
  permission_handler: ^11.3.1
  file_picker: ^8.0.0+1
  mobile_scanner: ^7.1.4
  http: ^1.6.0
  share_plus: ^10.1.4
  tflite_flutter: ^0.12.1
  record: ^6.1.2
  audio_session: ^0.2.2
  webview_flutter: ^4.10.0
  webview_windows: ^0.4.0
  firebase_auth: ^5.1.1
  firebase_core: ^3.4.1
  cloud_firestore: ^5.0.2
  firebase_storage: ^12.1.1
  google_sign_in: ^6.2.1
  flutter_foreground_task: ^9.2.1
  pedometer: ^4.2.0
  geolocator: ^14.0.2
  window_manager: ^0.4.3
  shared_preferences: ^2.2.0
  google_generative_ai: ^0.4.3
  sherpa_onnx: any
  piper_tts_plugin:
    git:
      url: https://github.com/dev-6768/piper_tts_plugin.git
  just_audio: ^0.10.5
  flutter_animate: ^4.5.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: any
  isar_generator: ^3.1.0
  injectable_generator: any
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/muscles/chest.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true

  assets:
    - assets/images/muscles/
    - assets/audio/
    - assets/audio/alarms/
    - assets/models/
    - assets/3d/

dependency_overrides:
  share_plus:
    path: plugins/share_plus
